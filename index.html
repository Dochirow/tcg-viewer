<!doctype html>
<html lang="fr">
<!-- TCG-Studio classeur partagé · v2026-07-07e · hébergé sur GitHub Pages
     (Supabase Storage ET Edge Functions neutralisent le HTML → text/plain).
     La page appelle Supabase en RPC (CORS *) : marche depuis n'importe quel domaine. -->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Classeur TCG-Studio</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background:#0C0D16; color:#F5F3EC; }
  header { padding:14px 16px; position:sticky; top:0; z-index:5; background:#12131f;
           border-bottom:1px solid #23253a; display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; margin:0; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pseudo { padding:8px 10px; border-radius:10px; border:1px solid #33354d; background:#191b2a;
            color:#fff; font-size:14px; width:130px; }
  main { padding:12px; max-width:560px; margin:0 auto; }
  .msg { text-align:center; padding:40px 16px; color:#8E90A0; }

  /* Page de classeur : papier + anneaux à gauche */
  .binder { position:relative; border-radius:16px; padding:10px 10px 10px 26px;
            background:linear-gradient(135deg,#2b2d42,#1b1c2a); box-shadow:0 10px 26px #0008;
            transition:opacity .18s, transform .18s; }
  .rings { position:absolute; left:5px; top:14px; bottom:14px; width:14px;
           display:flex; flex-direction:column; justify-content:space-around; }
  .ring { width:12px; height:12px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#e9ebf5,#6b6e85); }
  .paper { background:#FBFAF7; border-radius:6px 12px 12px 6px; padding:10px; }
  .paphead { display:flex; justify-content:space-between; color:#8A8C99; font-size:11px;
             font-weight:700; margin-bottom:8px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }

  .card { background:#fff; border:1px solid #e6e4dd; border-radius:9px; overflow:hidden;
          display:flex; flex-direction:column; color:#1b1b22; }
  .wrap { position:relative; }
  .card img { width:100%; aspect-ratio:.716; object-fit:cover; background:#eee; display:block; cursor:zoom-in; }
  .lightbox { position:fixed; inset:0; background:#000e; display:none; align-items:center;
              justify-content:center; padding:20px; z-index:20; cursor:zoom-out; }
  .lightbox.show { display:flex; }
  .lightbox img { max-width:100%; max-height:100%; border-radius:12px; box-shadow:0 12px 40px #000; }
  .badge { position:absolute; top:5px; left:5px; padding:2px 6px; border-radius:7px; font-size:9px;
           font-weight:700; color:#fff; background:#c24557; }
  .qte { position:absolute; top:5px; right:5px; padding:2px 6px; border-radius:7px; font-size:10px;
         font-weight:800; color:#1b1b22; background:#F1D48A; }
  .info { padding:6px 7px; font-size:11px; line-height:1.35; }
  .info .nm { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .info .n { color:#8a8c99; font-weight:600; }
  .info .vary { color:#2E6FB8; font-weight:700; }
  .info .etat { color:#6b6e85; }
  .info .prix { color:#A8853D; font-weight:800; }
  .card button { margin:0 7px 7px; padding:7px; border:0; border-radius:8px; font-weight:700;
                 font-size:12px; background:#141521; color:#F1D48A; cursor:pointer; }
  .card button:disabled { background:#d9d7cf; color:#8a8c99; cursor:default; }

  .nav { display:flex; align-items:center; justify-content:center; gap:16px; margin:16px 0 8px; }
  .nav button { padding:10px 18px; border:1px solid #33354d; border-radius:12px; background:#191b2a;
                color:#fff; font-size:16px; font-weight:700; cursor:pointer; }
  .nav button:disabled { opacity:.35; cursor:default; }
  .nav .pg { font-size:14px; color:#8E90A0; min-width:80px; text-align:center; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#1b1d2c;
           border:1px solid #33354d; padding:10px 16px; border-radius:12px; opacity:0;
           transition:opacity .2s; pointer-events:none; z-index:9; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1 id="titre">Classeur…</h1>
  <input id="pseudo" class="pseudo" placeholder="Ton pseudo" maxlength="24" />
</header>
<main><div id="content" class="msg">Chargement…</div></main>
<div id="toast" class="toast"></div>
<div id="lightbox" class="lightbox"><img id="lbimg" alt="" /></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://pyypatyysuxeksfnjrhq.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5eXBhdHl5c3V4ZWtzZm5qcmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMzE0NDAsImV4cCI6MjA5ODcwNzQ0MH0.wKGyUPGXW1VhxfKhG6ClQWNV4yZsFpHSGhtM9WQV8dI";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const params = new URLSearchParams(location.search);
  const code = (params.get("c") || "").toUpperCase();

  const content = document.getElementById("content");
  const titreEl = document.getElementById("titre");
  const pseudoEl = document.getElementById("pseudo");
  pseudoEl.value = localStorage.getItem("pseudo") || "";
  pseudoEl.addEventListener("change", () => localStorage.setItem("pseudo", pseudoEl.value.trim()));

  const PAGE_SIZE = 9;
  let BINDER = null, CARDS = [], PAGE = 0;

  function toast(t) {
    const el = document.getElementById("toast");
    el.textContent = t; el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2200);
  }
  function esc(s){ return (s||"").replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
  // Les images One Piece officielles envoient « Cross-Origin-Resource-Policy:
  // same-site » → le navigateur refuse de les afficher hors de leur domaine
  // (image vide sur cette page). On les passe par un proxy image (wsrv.nl) qui
  // les re-sert en cross-origin. Les autres sources (TCGdex, Riftbound…) sont OK.
  function proxImg(u){
    if (!u) return u || "";
    return /onepiece-cardgame\.com/.test(u)
      ? "https://wsrv.nl/?url=" + encodeURIComponent(u)
      : u;
  }

  async function charger() {
    if (!code) { content.textContent = "Lien invalide (code manquant)."; return; }
    // Fonction serveur : impossible d'énumérer les classeurs, il faut connaître
    // le CODE exact. Renvoie { binder, cards } ou null.
    const { data, error } = await sb.rpc("classeur_par_code", { p_code: code });
    if (error || !data || !data.binder) {
      content.textContent = "Classeur introuvable ou partage fermé."; return;
    }
    const b = data.binder;
    BINDER = b;
    titreEl.textContent = b.titre || "Classeur";
    CARDS = data.cards || [];
    if (!CARDS.length) { content.textContent = "Aucune carte disponible."; return; }
    // Prépare le conteneur.
    content.outerHTML = '<div id="content"></div>';
    render();
  }

  function nbPages(){ return Math.max(1, Math.ceil(CARDS.length / PAGE_SIZE)); }

  function render() {
    const root = document.getElementById("content");
    const total = nbPages();
    if (PAGE >= total) PAGE = total - 1;
    const debut = PAGE * PAGE_SIZE;
    const slice = CARDS.slice(debut, debut + PAGE_SIZE);

    let cells = "";
    for (const c of slice) {
      const dispo = c.statut === "dispo";
      const img = c.photo_url || proxImg(c.image_url) || "";
      const imgHd = c.photo_url || proxImg((c.image_url || "").replace(/\/low\.(webp|png|jpg)/, "/high.$1"));
      const etat = (c.etat && c.etat.trim()) ? esc(c.etat) : "À voir sur place";
      const prix = (BINDER.show_prices && c.prix != null) ? `<span class="prix">${(+c.prix).toFixed(2)} €</span>` : "";
      const qte = (c.quantite && c.quantite > 1) ? `<span class="qte">×${c.quantite}</span>` : "";
      const badge = !dispo ? `<span class="badge">${c.statut === "reserve" ? "Réservé" : "Vendu"}</span>` : "";
      cells += `
        <div class="card">
          <div class="wrap">
            ${badge}${qte}
            <img loading="lazy" src="${esc(img)}" data-full="${esc(imgHd)}" alt="" onerror="this.style.opacity=.15" />
          </div>
          <div class="info">
            <div class="nm"><span class="n">${esc(c.numero)}</span> ${esc(c.nom)}</div>
            ${c.variante ? `<div class="vary">${esc(c.variante)}</div>` : ""}
            <div class="etat">${etat}</div>
            ${prix}
          </div>
          <button data-id="${c.id}" ${dispo ? "" : "disabled"}>${dispo ? "Réserver" : "Indisponible"}</button>
        </div>`;
    }
    // Complète la grille pour garder 3 colonnes alignées.
    const manque = (3 - (slice.length % 3)) % 3;
    for (let i = 0; i < manque; i++) cells += '<div></div>';

    root.innerHTML = `
      <div class="binder">
        <div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
        <div class="paper">
          <div class="paphead"><span>Page ${PAGE + 1} / ${total}</span><span>${CARDS.length} carte(s)</span></div>
          <div class="grid">${cells}</div>
        </div>
      </div>
      <div class="nav">
        <button id="prev" ${PAGE === 0 ? "disabled" : ""}>◀</button>
        <span class="pg">Page ${PAGE + 1} / ${total}</span>
        <button id="next" ${PAGE >= total - 1 ? "disabled" : ""}>▶</button>
      </div>`;

    root.querySelectorAll("button[data-id]").forEach(btn =>
      btn.onclick = () => reserver(btn.dataset.id, btn));
    root.querySelectorAll(".card img").forEach(im =>
      im.onclick = () => ouvrirGrand(im.dataset.full || im.src));
    const prev = document.getElementById("prev"), next = document.getElementById("next");
    if (prev) prev.onclick = () => { if (PAGE > 0) { PAGE--; flip(); } };
    if (next) next.onclick = () => { if (PAGE < total - 1) { PAGE++; flip(); } };
  }

  function flip() {
    const b = document.querySelector(".binder");
    if (b) { b.style.opacity = 0; b.style.transform = "translateX(8px)"; }
    setTimeout(() => { render(); window.scrollTo({ top: 0, behavior: "smooth" }); }, 120);
  }

  const lb = document.getElementById("lightbox"), lbimg = document.getElementById("lbimg");
  function ouvrirGrand(src) { lbimg.src = src; lb.classList.add("show"); }
  lb.onclick = () => lb.classList.remove("show");

  async function reserver(cardId, btn) {
    const pseudo = (pseudoEl.value || "").trim();
    if (!pseudo) { toast("Mets ton pseudo en haut d'abord"); pseudoEl.focus(); return; }
    btn.disabled = true; btn.textContent = "…";
    const { error } = await sb.rpc("reserver_carte", { p_card: cardId, p_visitor: pseudo, p_message: null });
    if (error) { btn.disabled = false; btn.textContent = "Réserver"; toast("Échec, réessaie"); return; }
    btn.textContent = "Demandé ✓";
    toast("Réservation envoyée au vendeur");
  }

  charger();
</script>
</body>
</html>
